<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS PRO | World-Class Gaming Community</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Framer Motion & React Dependencies (via CDNs) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;1,900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0A;
            overflow-x: hidden;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cyber-shadow-primary {
            box-shadow: 0 0 20px rgba(204, 255, 0, 0.3);
        }

        .cyber-shadow-primary:hover {
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.5);
        }

        .cyber-shadow-secondary {
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        onyx: '#0A0A0A',
                        lime: '#CCFF00',
                        violet: '#8B5CF6',
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Fragment } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- COMPONENTS ---
        
        const NeuralBackground = () => (
            <div className="fixed inset-0 z-0 pointer-events-none opacity-20">
                <svg width="100%" height="100%">
                    <pattern id="neural-pattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
                        <circle cx="2" cy="2" r="1" fill="#8B5CF6" />
                        <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(204,255,0,0.1)" strokeWidth="0.5" />
                    </pattern>
                    <rect width="100%" height="100%" fill="url(#neural-pattern)" />
                </svg>
                <div className="absolute inset-0 bg-gradient-to-tr from-[#0A0A0A] via-transparent to-[#8B5CF6]/10" />
            </div>
        );

        const Navbar = () => (
            <nav className="fixed top-0 w-full z-[100] border-b border-white/10 bg-[#0A0A0A]/80 backdrop-blur-md">
                <div className="max-w-[2560px] mx-auto px-6 h-20 flex items-center justify-between">
                    <div className="flex items-center gap-8">
                        <div className="flex items-center gap-2 cursor-pointer">
                            <div className="w-10 h-10 bg-[#CCFF00] rounded flex items-center justify-center">
                                <i data-lucide="zap" className="text-black fill-black w-6 h-6"></i>
                            </div>
                            <span className="text-2xl font-black text-white italic tracking-tighter">NEXUS<span className="text-[#CCFF00]">PRO</span></span>
                        </div>
                        <div className="hidden lg:flex gap-6 text-xs font-bold uppercase tracking-[0.2em] text-gray-500">
                            <a href="#" className="hover:text-[#CCFF00] transition-colors">Platform</a>
                            <a href="#" className="hover:text-[#CCFF00] transition-colors">Tournaments</a>
                            <a href="#" className="hover:text-[#8B5CF6] transition-colors">Ecosystem</a>
                        </div>
                    </div>
                    <div className="flex items-center gap-4">
                        <div className="hidden md:flex bg-white/5 border border-white/10 rounded-full px-4 py-2 items-center gap-3">
                            <i data-lucide="search" className="text-gray-500 w-4 h-4"></i>
                            <input className="bg-transparent border-none text-xs text-white focus:ring-0 w-48 outline-none" placeholder="Search Archives..." />
                        </div>
                        <div className="flex gap-2">
                            <button className="bg-white/5 backdrop-blur-md border border-white/10 text-white hover:bg-white/10 p-3 rounded-xl transition-all">
                                <i data-lucide="bell" className="w-5 h-5"></i>
                            </button>
                            <button className="hidden sm:flex bg-[#CCFF00] text-black px-6 py-3 rounded-xl font-bold uppercase tracking-tighter cyber-shadow-primary transition-all">
                                Connect Wallet
                            </button>
                        </div>
                    </div>
                </div>
            </nav>
        );

        const CommunitySidebar = () => {
            const lobbies = [
                { id: 1, game: "Valorant", host: "AceMaster", status: "Joining", color: "bg-[#CCFF00]" },
                { id: 2, game: "League of Legends", host: "FakerFan", status: "In-Game", color: "bg-[#8B5CF6]" },
                { id: 3, game: "Warzone", host: "Ghost", status: "Joining", color: "bg-[#CCFF00]" },
            ];

            return (
                <aside className="hidden xl:flex flex-col gap-6 w-[350px] sticky top-24 h-[calc(100vh-120px)]">
                    <div className="glass-box p-6 rounded-2xl">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-white font-black uppercase italic flex items-center gap-2">
                                <i data-lucide="activity" className="text-[#CCFF00] w-5 h-5"></i> Active Lobbies
                            </h3>
                            <span className="text-[10px] text-gray-500 font-bold uppercase tracking-widest">42 Online</span>
                        </div>
                        <div className="space-y-4">
                            {lobbies.map(lobby => (
                                <div key={lobby.id} className="flex items-center justify-between group cursor-pointer hover:translate-x-1 transition-transform">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-2 h-2 rounded-full ${lobby.color} animate-pulse-slow`} />
                                        <div>
                                            <p className="text-sm font-bold text-white group-hover:text-[#CCFF00] transition-colors">{lobby.game}</p>
                                            <p className="text-[10px] text-gray-500 uppercase">{lobby.host}</p>
                                        </div>
                                    </div>
                                    <i data-lucide="chevron-right" className="text-gray-700 group-hover:text-white w-4 h-4"></i>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="glass-box p-6 rounded-2xl bg-gradient-to-br from-[#8B5CF6]/20 to-transparent">
                        <h3 className="text-white font-black uppercase italic mb-4">Pro Tournament</h3>
                        <div className="flex items-center gap-4 mb-4">
                            <div className="text-2xl font-black text-white">12:04:55</div>
                            <div className="text-[10px] text-[#8B5CF6] font-bold uppercase leading-tight">Until Kickoff<br/>$50,000 Prize</div>
                        </div>
                        <button className="w-full bg-[#8B5CF6] text-white py-3 rounded-xl font-bold uppercase tracking-tighter text-xs cyber-shadow-secondary transition-all">
                            Join Bracket
                        </button>
                    </div>
                </aside>
            );
        };

        const CreatorDashboard = () => {
            const [isUploading, setIsUploading] = useState(false);
            const [progress, setProgress] = useState(0);

            const startUpload = () => {
                if (isUploading) return;
                setIsUploading(true);
                let p = 0;
                const interval = setInterval(() => {
                    p += 5;
                    setProgress(p);
                    if (p >= 100) {
                        clearInterval(interval);
                        setTimeout(() => {
                            setIsUploading(false);
                            setProgress(0);
                        }, 1000);
                    }
                }, 100);
            };

            return (
                <div className="glass-box p-8 mb-12 relative overflow-hidden group rounded-2xl">
                    <div className="absolute top-0 right-0 p-8 opacity-10 group-hover:opacity-20 transition-opacity">
                        <i data-lucide="cpu" className="text-[#CCFF00] w-32 h-32"></i>
                    </div>
                    <div className="relative z-10">
                        <h2 className="text-3xl font-black text-white uppercase italic mb-2 tracking-tighter">Creator Core</h2>
                        <p className="text-gray-500 text-sm mb-8">Drag & drop your clips to sync with the Nexus network.</p>
                        
                        <div 
                            onClick={startUpload}
                            className={`border-2 border-dashed rounded-2xl p-12 transition-all cursor-pointer flex flex-col items-center justify-center gap-4
                            ${isUploading ? 'border-[#CCFF00] bg-[#CCFF00]/5' : 'border-white/10 hover:border-white/30 hover:bg-white/5'}`}
                        >
                            {isUploading ? (
                                <div className="w-full max-w-md">
                                    <div className="flex justify-between text-xs font-bold text-[#CCFF00] uppercase mb-2">
                                        <span>Syncing Metadata...</span>
                                        <span>{progress}%</span>
                                    </div>
                                    <div className="h-1 w-full bg-white/10 rounded-full overflow-hidden">
                                        <div className="h-full bg-[#CCFF00] transition-all duration-100" style={{width: `${progress}%`}}></div>
                                    </div>
                                </div>
                            ) : (
                                <Fragment>
                                    <div className="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center text-gray-400 group-hover:text-[#CCFF00] transition-colors">
                                        <i data-lucide="upload" className="w-8 h-8"></i>
                                    </div>
                                    <p className="text-xs font-bold text-gray-500 uppercase tracking-widest">MP4, MOV up to 500MB</p>
                                </Fragment>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const MasonryFeed = () => {
            const tags = ['All', 'Clutch', 'Fail', 'Pentakill', 'Speedrun', 'Tutorial'];
            const [activeTag, setActiveTag] = useState('All');

            const clips = [
                { id: 1, tag: '#Pentakill', user: 'Zeus_OG', views: '2.4M', img: 'https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=800' },
                { id: 2, tag: '#Clutch', user: 'Nightmare', views: '890K', img: 'https://images.unsplash.com/photo-1538481199705-c710c4e965fc?auto=format&fit=crop&q=80&w=800' },
                { id: 3, tag: '#Fail', user: 'NoobMaster69', views: '1.2M', img: 'https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf?auto=format&fit=crop&q=80&w=800' },
                { id: 4, tag: '#Pentakill', user: 'Riot_Dev', views: '500K', img: 'https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&q=80&w=800' },
                { id: 5, tag: '#Speedrun', user: 'Dreamer', views: '3.1M', img: 'https://images.unsplash.com/photo-1552820728-8b83bb6b773f?auto=format&fit=crop&q=80&w=800' },
                { id: 6, tag: '#Tutorial', user: 'ProTips', views: '150K', img: 'https://images.unsplash.com/photo-1605898835373-023444058a2d?auto=format&fit=crop&q=80&w=800' },
            ];

            return (
                <section>
                    <div className="flex flex-wrap items-center justify-between gap-4 mb-8">
                        <h2 className="text-2xl font-black text-white uppercase italic tracking-tighter">Live Nexus Feed</h2>
                        <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                            {tags.map(tag => (
                                <button
                                    key={tag}
                                    onClick={() => setActiveTag(tag)}
                                    className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all
                                    ${activeTag === tag ? 'bg-[#CCFF00] text-black' : 'bg-white/5 text-gray-500 hover:bg-white/10 border border-white/10'}`}
                                >
                                    {tag}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="columns-1 sm:columns-2 lg:columns-3 gap-6 space-y-6">
                        {clips.map((clip, idx) => (
                            <motion.div
                                key={clip.id}
                                initial={{ opacity: 0, y: 30 }}
                                whileInView={{ opacity: 1, y: 0 }}
                                viewport={{ once: true }}
                                transition={{ delay: idx * 0.1 }}
                                className="break-inside-avoid"
                            >
                                <div className="relative group rounded-2xl overflow-hidden bg-white/5 border border-white/10">
                                    <div className="relative aspect-video overflow-hidden">
                                        <img src={clip.img} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt="Clip" />
                                        <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center backdrop-blur-[2px]">
                                            <div className="w-12 h-12 bg-[#CCFF00] rounded-full flex items-center justify-center text-black">
                                                <i data-lucide="play" className="fill-black ml-1 w-6 h-6"></i>
                                            </div>
                                        </div>
                                        <div className="absolute top-4 left-4 flex gap-2">
                                            <span className="bg-[#8B5CF6] text-white text-[8px] font-black px-2 py-1 rounded uppercase tracking-tighter">{clip.tag}</span>
                                        </div>
                                    </div>
                                    <div className="p-4 flex flex-col gap-3">
                                        <div className="flex justify-between items-start">
                                            <h4 className="text-white font-bold text-sm leading-tight group-hover:text-[#CCFF00] transition-colors">Top Tier Gameplay Moments</h4>
                                            <button className="text-gray-500 hover:text-white"><i data-lucide="more-horizontal" className="w-4 h-4"></i></button>
                                        </div>
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center gap-2">
                                                <div className="w-6 h-6 rounded-full bg-gradient-to-tr from-[#8B5CF6] to-[#CCFF00] p-[1px]">
                                                    <img src={`https://i.pravatar.cc/100?u=${clip.user}`} className="rounded-full w-full h-full object-cover" />
                                                </div>
                                                <span className="text-[10px] font-bold text-gray-400">@{clip.user}</span>
                                            </div>
                                            <div className="flex gap-3">
                                                <div className="flex items-center gap-1 text-[10px] text-gray-500 font-bold uppercase">
                                                    <i data-lucide="flame" className="text-[#CCFF00] w-3 h-3"></i> {clip.views}
                                                </div>
                                                <button className="text-gray-500 hover:text-[#CCFF00]"><i data-lucide="heart" className="w-4 h-4"></i></button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </motion.div>
                        ))}
                    </div>
                </section>
            );
        };

        const App = () => {
            useEffect(() => {
                // Initialize Lucide icons after rendering
                lucide.createIcons();
            }, []);

            return (
                <div className="min-h-screen text-white selection:bg-[#CCFF00] selection:text-black relative">
                    <NeuralBackground />
                    <Navbar />

                    <main className="max-w-[2560px] mx-auto pt-32 px-6 pb-24 relative z-10">
                        <div className="flex flex-col xl:flex-row gap-12">
                            <div className="flex-1 min-w-0">
                                <header className="mb-16">
                                    <motion.div initial={{ opacity: 0, x: -20 }} animate={{ opacity: 1, x: 0 }} className="flex items-center gap-4 mb-4">
                                        <span className="px-3 py-1 bg-white/5 border border-white/10 rounded-full text-[10px] font-black text-[#CCFF00] uppercase tracking-widest">System Status: Optimal</span>
                                        <div className="h-[1px] flex-1 bg-gradient-to-r from-white/10 to-transparent" />
                                    </motion.div>
                                    <h1 className="text-5xl md:text-8xl font-black uppercase italic tracking-tighter leading-[0.85] mb-6">
                                        Redefine the <br />
                                        <span className="text-[#CCFF00]">Meta-Verse.</span>
                                    </h1>
                                    <p className="max-w-xl text-gray-400 text-lg">
                                        The most advanced social layer for professional gamers and content creators. 
                                        Experience seamless integration and global recognition.
                                    </p>
                                </header>
                                <CreatorDashboard />
                                <MasonryFeed />
                            </div>
                            <CommunitySidebar />
                        </div>
                    </main>

                    <footer className="border-t border-white/10 bg-[#0A0A0A] py-12 px-6 relative z-10">
                        <div className="max-w-[2560px] mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
                            <div className="flex items-center gap-2">
                                <i data-lucide="zap" className="text-[#CCFF00] w-5 h-5 fill-[#CCFF00]"></i>
                                <span className="font-black italic tracking-tighter">NEXUS PRO © 2024</span>
                            </div>
                            <div className="flex gap-8 text-[10px] font-black uppercase tracking-widest text-gray-500">
                                <a href="#" className="hover:text-white transition-colors">Whitepaper</a>
                                <a href="#" className="hover:text-white transition-colors">Governance</a>
                                <a href="#" className="hover:text-white transition-colors">Security</a>
                            </div>
                            <div className="text-gray-600 text-[10px] font-mono">BUILD_VERSION: 4.2.0-STABLE</div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
